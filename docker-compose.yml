services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=development
      - LOG_LEVEL=debug
      # ASR Provider (server-managed)
      - ASR_PROVIDER=${ASR_PROVIDER:-deepgram}  # google | deepgram | openai | qwen-local
      - ASR_MODEL=${ASR_MODEL:-nova-3}
      # ASR Credentials
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/google-creds.json
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Translation (both stages independently configurable)
      - TRANSLATION_INTERIM_PROVIDER=${TRANSLATION_INTERIM_PROVIDER:-google}
      - TRANSLATION_FINAL_PROVIDER=${TRANSLATION_FINAL_PROVIDER:-google}
      - TRANSLATION_INTERIM_MODEL=${TRANSLATION_INTERIM_MODEL:-nmt}
      - TRANSLATION_FINAL_MODEL=${TRANSLATION_FINAL_MODEL:-tllm}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - GOOGLE_TRANSLATION_PROJECT_ID=${GOOGLE_TRANSLATION_PROJECT_ID}
      - GOOGLE_TRANSLATION_LOCATION=${GOOGLE_TRANSLATION_LOCATION:-us-central1}
      # Local translation (Qwen3-30B-A3B via vLLM/MLX)
      - QWEN_TRANSLATION_URL=${QWEN_TRANSLATION_URL:-http://host.docker.internal:8002/v1}
      - QWEN_TRANSLATION_MODEL=${QWEN_TRANSLATION_MODEL:-Qwen/Qwen3-30B-A3B}
      # Qwen3-ASR
      - QWEN3_ASR_ENABLED=${QWEN3_ASR_ENABLED:-false}
      - QWEN3_ASR_HOST=qwen3-asr
      - QWEN3_ASR_PORT=8001
    depends_on: []
    volumes:
      - ./server/src:/app/src
      - ./server/scripts:/app/scripts
      - ./secrets:/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  qwen3-asr:
    build:
      context: ./qwen3-asr
      dockerfile: Dockerfile.gpu
    ports:
      - "8001:8001"
    environment:
      - QWEN3_ASR_MODEL=Qwen/Qwen3-ASR-1.7B
      - QWEN3_ASR_HOST=0.0.0.0
      - QWEN3_ASR_PORT=8001
      - GPU_MEMORY_UTILIZATION=0.9
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - gpu

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - VITE_WS_URL=ws://localhost:8080/ws
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./sdk/src:/app/sdk/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3


